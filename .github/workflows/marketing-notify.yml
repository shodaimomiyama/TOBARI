name: Marketing Draft Notify

on:
  release:
    types: [published]
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  notify-slack:
    runs-on: ubuntu-latest
    # Skip if commit message contains [skip marketing]
    if: "!contains(github.event.head_commit.message, '[skip marketing]')"
    
    steps:
      - name: Build Slack payload
        id: payload
        run: |
          REPO="${{ github.repository }}"
          REPO_NAME="${{ github.event.repository.name }}"
          EVENT="${{ github.event_name }}"
          
          if [ "$EVENT" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            RELEASE_NAME="${{ github.event.release.name }}"
            RELEASE_BODY="${{ github.event.release.body }}"
            RELEASE_URL="${{ github.event.release.html_url }}"
            
            TEXT="🚀 *[${REPO_NAME}] New Release: ${TAG}*\n"
            TEXT="${TEXT}Release: ${RELEASE_NAME}\n"
            TEXT="${TEXT}Notes: ${RELEASE_BODY}\n"
            TEXT="${TEXT}URL: ${RELEASE_URL}\n\n"
            TEXT="${TEXT}<@U0AGHF86GLW> リリース投稿ドラフトを作成して（日英バイリンガル）"
            
          elif [ "$EVENT" = "push" ]; then
            BRANCH="${{ github.ref_name }}"
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            COMMIT_URL="${{ github.event.head_commit.url }}"
            AUTHOR="${{ github.event.head_commit.author.name }}"
            COMMIT_COUNT="${{ github.event.commits.length }}"
            
            TEXT="📦 *[${REPO_NAME}] Push to ${BRANCH}*\n"
            TEXT="${TEXT}Commits: ${COMMIT_COUNT}\n"
            TEXT="${TEXT}Latest: ${COMMIT_MSG}\n"
            TEXT="${TEXT}URL: ${COMMIT_URL}\n\n"
            TEXT="${TEXT}<@U0AGHF86GLW> 開発進捗ポストのネタにして（必要なら）"
          fi
          
          echo "text=${TEXT}" >> $GITHUB_OUTPUT

      - name: Post to Slack
        run: |
          curl -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"C0ALSQC4VKN\",
              \"text\": \"${{ steps.payload.outputs.text }}\"
            }"
